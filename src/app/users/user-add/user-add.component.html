<div class="container">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <h2>Add User</h2>
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" name="firstName" id="firstName" formControlName="firstName" class="form-control">
            <span></span>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" name="lastName" id="lastName" formControlName="lastName" class="form-control">
            <span></span>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" name="email" id="email" formControlName="email" class="form-control">
            <span></span>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="text" name="password" id="password" formControlName="password" class="form-control">
            <span></span>
        </div>
        <div formArrayName="addresses">
            <ng-container *ngFor="let role of addresses; let i = index">
                <h3>Addresses</h3>
                <div [formGroupName]="i">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" name="city" id="city" formControlName="city" class="form-control">
                        <span></span>
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" name="country" id="country" formControlName="country" class="form-control">
                        <span></span>
                    </div>
                    <div class="form-group">
                        <label for="streetName">Street</label>
                        <input type="text" name="streetName" id="streetName" formControlName="streetName" class="form-control">
                        <span></span>
                    </div>
                    <div class="form-group">
                        <label for="postalCode">Postal Code</label>
                        <input type="text" name="postalCode" id="postalCode" formControlName="postalCode" class="form-control">
                        <span></span>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <!-- <input type="text" name="type" id="type" formControlName="type" class="form-control"> -->
                        <select formControlName="type" (change)="changeType()">
                            <option value="">Choose address type</option>
                            <!-- <option value=""></option> -->
                        </select>
                        <span></span>
                    </div>
                </div>
            </ng-container>
        </div>
        <div formArrayName="roles">
            <ng-container *ngFor="let role of roles; let i = index">
                <h3>Roles</h3>
                <div [formGroupName]="i">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name" formControlName="name" class="form-control">
                        <span></span>
                    </div>
                </div>
                <!-- <ng-container *ngFor="let authority of roles.; let i = index">

                </ng-container> -->
            </ng-container>
        </div>
        <br>
        <div>
            <button type="submit" class="btn btn-primary">Add</button> | 
            <button type="submit" class="btn btn-secondary">Cancel</button>
        </div>
        <!-- {{ form.value | json }} -->
    </form>
</div>
